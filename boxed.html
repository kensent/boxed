<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>BOXED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f5f5f0;
    --red: #ff2e2e;
    --blue: #2e9eff;
    --yellow: #ffe83d;
    --green: #3dff8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,46,46,0.08), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(46,158,255,0.08), transparent 50%);
  }
  #app {
    width: 390px;
    height: 693px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  /* Fake-fullscreen fallback — used when the browser has no element-level
     fullscreen API (iPhone Safari is the case that prompted this). Scales
     #app up to fill the dynamic viewport while preserving its 390×693
     aspect ratio. dvh tracks the iOS Safari URL-bar collapse, so the
     scaled-up app naturally fills more area as the user scrolls and the
     URL bar shrinks. The body's gradient is replaced with the flat bg
     so nothing peeks out of the scaled-app's letterbox. */
  body.fake-fullscreen { background: var(--bg); }
  body.fake-fullscreen #app {
    transform: scale(min(100vw / 390, 100dvh / 693));
    transform-origin: center center;
  }
  footer#app-footer {
    padding: 10px 16px 12px;
    border-top: 2px solid var(--fg);
    flex-shrink: 0;
    display: none;
  }
  footer#app-footer.show { display: block; }
  .seed-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .seed-label { font-family: 'Bungee', sans-serif; font-size: 9px; letter-spacing: 1.5px; opacity: 0.55; flex-shrink: 0; }
  #seed-input { flex: 1; min-width: 0; background: #161616; border: 2px solid #333; color: var(--fg); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 6px 8px; }
  #seed-input::placeholder { color: #555; }
  #seed-input:focus { outline: none; border-color: var(--yellow); }
  #seed-clear,
  #fullscreen-btn { flex-shrink: 0; background: #161616; border: 2px solid #333; color: var(--fg); font-size: 13px; width: 30px; height: 30px; cursor: pointer; transition: transform 0.08s, border-color 0.12s; }
  #seed-clear:hover,
  #fullscreen-btn:hover { border-color: var(--fg); }
  #seed-clear:active,
  #fullscreen-btn:active { transform: scale(0.92); }
  /* REC toggle — arms the in-app fight recorder (record.js). Red when armed. */
  #rec-btn { flex-shrink: 0; background: #161616; border: 2px solid #333; color: var(--fg); font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; height: 30px; padding: 0 9px; cursor: pointer; transition: transform 0.08s, border-color 0.12s, background 0.12s, color 0.12s; }
  #rec-btn:hover { border-color: var(--fg); }
  #rec-btn:active { transform: scale(0.92); }
  #rec-btn.armed { background: var(--red); border-color: var(--red); color: #fff; }
  .hunt-btn { width: 100%; background: #161616; color: var(--yellow); border: 2px dashed var(--yellow); font-family: 'Bungee', sans-serif; font-size: 11px; letter-spacing: 1px; padding: 9px; cursor: pointer; margin-bottom: 8px; transition: transform 0.08s, background 0.12s; }
  .hunt-btn:hover { background: #1f1c0a; }
  .hunt-btn:active { transform: scale(0.98); }
  .hunt-btn:disabled { color: #666; border-color: #444; cursor: wait; }
  .screen { flex: 1; display: none; flex-direction: column; padding: 12px; overflow-y: auto; }
  .screen.active { display: flex; }
  .selectors { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .pick-slot { border: 2px dashed var(--fg); padding: 8px; text-align: center; min-height: 48px; }
  .pick-slot.red { border-color: var(--red); color: var(--red); }
  .pick-slot.blue { border-color: var(--blue); color: var(--blue); }
  .pick-slot .label { font-size: 8px; letter-spacing: 2px; opacity: 0.7; }
  .pick-slot .name { font-family: 'Bungee', sans-serif; font-size: 13px; margin-top: 3px; }
  .turn-indicator { text-align: center; font-size: 10px; letter-spacing: 3px; padding: 6px; margin-bottom: 10px; border: 1px solid var(--fg); }
  .turn-indicator.odds { letter-spacing: 0.5px; font-size: 11px; }
  .turn-indicator.red { color: var(--red); border-color: var(--red); }
  .turn-indicator.blue { color: var(--blue); border-color: var(--blue); }
  .roster { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
  .autopick { margin-bottom: 10px; }
  .autopick-label { font-family: 'Bungee', sans-serif; font-size: 8px; letter-spacing: 1.5px; opacity: 0.55; display: block; margin-bottom: 5px; }
  .autopick-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .ap-btn { font-family: 'Bungee', sans-serif; font-size: 9px; letter-spacing: 0.5px; padding: 8px 4px; background: #161616; color: var(--fg); border: 2px solid #333; cursor: pointer; transition: transform 0.08s, background 0.12s, border-color 0.12s; }
  .ap-btn:active { transform: scale(0.96); }
  #ap-coinflip:hover { border-color: var(--yellow); color: var(--yellow); }
  #ap-random:hover { border-color: var(--fg); }
  #ap-stomp:hover { border-color: var(--red); color: var(--red); }
  .fighter-card { background: #141414; border: 2px solid var(--fg); padding: 8px; cursor: pointer; transition: transform 0.08s, background 0.15s; position: relative; user-select: none; }
  .fighter-card:active { transform: scale(0.97); }
  .fighter-card.red-pick { background: var(--red); color: var(--bg); border-color: var(--red); }
  .fighter-card.blue-pick { background: var(--blue); color: var(--bg); border-color: var(--blue); }
  .fighter-card h3 { font-family: 'Bungee', sans-serif; font-size: 12px; letter-spacing: 1px; margin-bottom: 4px; }
  .fighter-card .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-bottom: 5px; padding: 3px 0; border-top: 1px solid currentColor; border-bottom: 1px solid currentColor; opacity: 0.85; }
  .fighter-card .stat { text-align: center; }
  .fighter-card .stat .k { font-family: 'Bungee', sans-serif; font-size: 7px; letter-spacing: 0.5px; opacity: 0.65; }
  .fighter-card .stat .v { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; line-height: 1.1; }
  .fighter-card .ability { font-size: 9px; line-height: 1.35; }
  .fighter-card .ability .row { display: flex; gap: 4px; margin-top: 2px; }
  .fighter-card .ability .tag { font-family: 'Bungee', sans-serif; font-size: 7px; padding: 1px 3px; flex-shrink: 0; letter-spacing: 0.5px; }
  .fighter-card .ability .tag.act { background: var(--yellow); color: var(--bg); }
  .fighter-card .ability .tag.pas { background: var(--fg); color: var(--bg); }
  .fighter-card.red-pick .ability .tag.act, .fighter-card.blue-pick .ability .tag.act { background: var(--bg); color: var(--yellow); }
  .fighter-card.red-pick .ability .tag.pas, .fighter-card.blue-pick .ability .tag.pas { background: var(--bg); color: var(--fg); }
  .fighter-card .ability .text { opacity: 0.9; line-height: 1.25; }
  .pick-tag { position: absolute; top: -8px; right: -8px; background: var(--bg); color: var(--fg); font-family: 'Bungee', sans-serif; font-size: 9px; padding: 2px 5px; border: 2px solid currentColor; pointer-events: none; }
  /* PREVIEW K.O. button (review tool — see previewDeath in engine.js) */
  .fighter-card .preview-row { display: flex; gap: 3px; margin-top: 5px; }
  .fighter-card .preview-btn {
    flex: 1; font-family: 'Bungee', sans-serif; font-size: 7px; letter-spacing: 0.5px;
    padding: 3px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,80,80,0.35);
    color: rgba(255,140,140,0.85); cursor: pointer; border-radius: 1px;
  }
  .fighter-card .preview-btn:hover { background: rgba(255,80,80,0.20); color: rgba(255,200,200,1); border-color: rgba(255,80,80,0.7); }
  .fighter-card.red-pick .preview-btn, .fighter-card.blue-pick .preview-btn { background: rgba(0,0,0,0.20); border-color: rgba(0,0,0,0.35); color: rgba(0,0,0,0.75); }
  .fighter-card.red-pick .preview-btn:hover, .fighter-card.blue-pick .preview-btn:hover { background: rgba(0,0,0,0.35); color: black; }
  button.cta { width: 100%; background: var(--yellow); color: var(--bg); border: 3px solid var(--fg); font-family: 'Bungee', sans-serif; font-size: 16px; letter-spacing: 2px; padding: 12px; cursor: pointer; transition: transform 0.08s; }
  button.cta:active { transform: scale(0.97); }
  button.cta:disabled { background: #333; color: #666; cursor: not-allowed; }
  /* Single-canvas fight screen — the canvas fills the whole 9:16 area and the
     renderer draws the HP band, arena sub-region, and VS-intro into it (see
     drawHpBars / drawVsIntro / resizeCanvas). The HP bars and intro used to be
     DOM/CSS overlaid on a small arena canvas; they were absorbed into the
     canvas so preview == export for the in-app recorder. */
  #fight-screen { padding: 0; }
  #fight-screen canvas {
    width: 100%; height: 100%;
    background: var(--bg);
    display: block;
  }

  /* Outro overlay removed — the celebration in the arena (glow + team-colour
     mote burst + 'win' arpeggio) IS the closing beat; no winner-name card
     opens on top of it. showWinnerOverlay() in main.js just schedules the
     auto-return now; nothing visual remains here. */
  .mtable-overlay { position: absolute; inset: 0; background: #0a0a0a; display: none; flex-direction: column; z-index: 12; padding: 12px; }
  .mtable-overlay.show { display: flex; animation: fadein 0.2s; }
  .mtable-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .mtable-title { font-family: 'Bungee', sans-serif; font-size: 13px; letter-spacing: 1px; }
  .mtable-hint { font-family: 'JetBrains Mono', monospace; font-size: 9px; opacity: 0.5; }
  .mtable-close { margin-left: auto; background: #161616; border: 2px solid #333; color: var(--fg); font-size: 12px; width: 28px; height: 28px; cursor: pointer; flex-shrink: 0; }
  .mtable-close:active { transform: scale(0.92); }
  .mtable-scroll { flex: 1; overflow: auto; min-height: 0; }
  #mtable-grid { border-collapse: collapse; font-family: 'JetBrains Mono', monospace; }
  #mtable-grid th { font-size: 7px; font-weight: 400; color: #888; padding: 2px; position: sticky; }
  #mtable-grid thead th { top: 0; background: #0a0a0a; z-index: 2; }
  #mtable-grid th.rowhead { left: 0; background: #0a0a0a; z-index: 1; text-align: right; padding-right: 3px; }
  #mtable-grid td { width: 19px; height: 19px; text-align: center; font-size: 8px; cursor: pointer; color: #fff; }
  #mtable-grid td.diag { background: #1a1a1a; color: #444; cursor: default; }
  #mtable-grid td.cell:active { outline: 2px solid var(--yellow); outline-offset: -2px; }
  .mtable-legend { display: flex; gap: 12px; justify-content: center; margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 9px; opacity: 0.7; }
  .mtable-legend span { display: flex; align-items: center; gap: 4px; }
  .mtable-legend i { width: 10px; height: 10px; display: inline-block; }
  .mrank-title { font-family: 'Bungee', sans-serif; font-size: 10px; letter-spacing: 1px; color: #888; margin: 16px 0 8px; }
  .mrank-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .mrank-rank { width: 16px; text-align: right; color: #666; flex-shrink: 0; }
  .mrank-name { width: 86px; flex-shrink: 0; }
  .mrank-bar { flex: 1; height: 12px; background: #1a1a1a; position: relative; min-width: 40px; }
  .mrank-fill { display: block; height: 100%; }
  .mrank-pct { width: 34px; text-align: right; flex-shrink: 0; }
  .sprite-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sprite-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 2px; background: #141414; cursor: pointer; }
  .sprite-cell canvas { width: 64px; height: 64px; }
  .sprite-cell span { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #aaa; }
  .sprite-cell.spinning { background: #1c2230; }
  /* The VS-intro overlay and HP bars are no longer DOM — they're drawn into
     the fight canvas (drawVsIntro / drawHpBars in render/arena.js), so the
     intro reveal, label fade-in, and VS-badge clash are now canvas animations
     timed off game.introT0 rather than CSS keyframes. */
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div id="app">

<section class="screen active" id="select-screen">
  <div class="selectors">
    <div class="pick-slot red">
      <div class="label">RED</div>
      <div class="name" id="slot-red-name">— EMPTY —</div>
    </div>
    <div class="pick-slot blue">
      <div class="label">BLUE</div>
      <div class="name" id="slot-blue-name">— EMPTY —</div>
    </div>
  </div>
  <div class="turn-indicator red" id="turn-indicator">PICKING: RED</div>
  <div class="autopick" id="autopick">
    <span class="autopick-label">AUTO MATCHUP</span>
    <div class="autopick-btns">
      <button class="ap-btn" id="ap-coinflip" data-mode="coinflip">COIN-FLIP</button>
      <button class="ap-btn" id="ap-random" data-mode="random">RANDOM</button>
      <button class="ap-btn" id="ap-stomp" data-mode="stomp">STOMP</button>
    </div>
    <div class="autopick-btns" style="margin-top:6px;">
      <button class="ap-btn" id="ap-table" style="grid-column:1/3;">MATCHUP TABLE</button>
      <button class="ap-btn" id="ap-sprites">SPRITE LIST</button>
    </div>
  </div>
  <div class="roster" id="roster"></div>
  <div class="mtable-overlay" id="mtable-overlay">
    <div class="mtable-head">
      <span class="mtable-title">MATCHUP TABLE</span>
      <span class="mtable-hint">tap a cell to pick that fight</span>
      <button class="mtable-close" id="mtable-close" aria-label="close">✕</button>
    </div>
    <div class="mtable-scroll">
      <table id="mtable-grid"></table>
      <div class="mrank-title">OVERALL WIN RATE</div>
      <div id="mrank-list"></div>
    </div>
    <div class="mtable-legend">
      <span><i style="background:#1f7a4d"></i>row wins</span>
      <span><i style="background:#3a3a3a"></i>even</span>
      <span><i style="background:#a83232"></i>row loses</span>
    </div>
  </div>
  <div class="mtable-overlay" id="sprite-overlay">
    <div class="mtable-head">
      <span class="mtable-title">SPRITE LIST</span>
      <span class="mtable-hint">tap to toggle rotation</span>
      <button class="mtable-close" id="sprite-close" aria-label="close">✕</button>
    </div>
    <div class="mtable-scroll"><div id="sprite-grid" class="sprite-grid"></div></div>
  </div>
</section>

<section class="screen" id="fight-screen">
  <!-- Single-canvas fight screen: the HP bars and the VS-intro reveal used to
       live in the DOM (overlaid on a small arena canvas). They are now drawn
       INTO this canvas by the renderer (drawHpBars / drawVsIntro in
       render/arena.js), so the canvas is the sole source of the fight image —
       which means the in-app recorder captures pixel-for-pixel what you see.
       The canvas fills the whole 9:16 fight area; the arena is a centred
       sub-region with the HP band above it (layout computed in resizeCanvas). -->
  <canvas id="canvas"></canvas>
</section>

<footer id="app-footer" class="show">
  <div class="seed-row">
    <label class="seed-label" for="seed-input">SEED</label>
    <input id="seed-input" type="text" inputmode="numeric" placeholder="random each fight" autocomplete="off" />
    <button id="seed-clear" title="clear — random each fight">↻</button>
    <button id="rec-btn" title="arm fight recorder — captures each fight to a .webm download">●REC</button>
    <button id="fullscreen-btn" title="toggle fullscreen (Esc to exit)">⛶</button>
  </div>
  <button id="hunt-btn" class="hunt-btn" style="display:none;">HUNT THE UPSET</button>
  <button id="hunt-tight-btn" class="hunt-btn" style="display:none;">HUNT A TIGHT FIGHT</button>
  <button id="hunt-low-hp-btn" class="hunt-btn" style="display:none;">HUNT A CLOSE FINISH</button>
  <button class="cta" id="fight-btn" disabled>FIGHT</button>
</footer>

</div>

<script src="js/rng.js"></script>
<script src="js/audio.js"></script>
<script src="js/fighters.js"></script>
<script src="js/matchups.js"></script>
<script src="js/quotes.js"></script>

<script src="js/ui.js"></script>


<script src="js/engine.js"></script>
<script src="js/combat.js"></script>
<script src="js/particles.js"></script>
<script src="js/abilities.js"></script>

<script src="js/render/sprites.js"></script>
<script src="js/render/arena.js"></script>

<script src="js/record.js"></script>

<script src="js/main.js"></script>

</body>
</html>
