<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BOXED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f5f5f0;
    --red: #ff2e2e;
    --blue: #2e9eff;
    --yellow: #ffe83d;
    --green: #3dff8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,46,46,0.08), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(46,158,255,0.08), transparent 50%);
  }
  header {
    padding: 12px 16px 8px;
    text-align: center;
    border-bottom: 2px solid var(--fg);
    flex-shrink: 0;
  }
  footer#app-footer {
    padding: 10px 16px 12px;
    border-top: 2px solid var(--fg);
    flex-shrink: 0;
    display: none;
  }
  footer#app-footer.show { display: block; }
  .seed-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .seed-label { font-family: 'Bungee', sans-serif; font-size: 9px; letter-spacing: 1.5px; opacity: 0.55; flex-shrink: 0; }
  #seed-input { flex: 1; min-width: 0; background: #161616; border: 2px solid #333; color: var(--fg); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 6px 8px; }
  #seed-input::placeholder { color: #555; }
  #seed-input:focus { outline: none; border-color: var(--yellow); }
  #seed-clear { flex-shrink: 0; background: #161616; border: 2px solid #333; color: var(--fg); font-size: 13px; width: 30px; height: 30px; cursor: pointer; transition: transform 0.08s, border-color 0.12s; }
  #seed-clear:hover { border-color: var(--fg); }
  #seed-clear:active { transform: scale(0.92); }
  .hunt-btn { width: 100%; background: #161616; color: var(--yellow); border: 2px dashed var(--yellow); font-family: 'Bungee', sans-serif; font-size: 11px; letter-spacing: 1px; padding: 9px; cursor: pointer; margin-bottom: 8px; transition: transform 0.08s, background 0.12s; }
  .hunt-btn:hover { background: #1f1c0a; }
  .hunt-btn:active { transform: scale(0.98); }
  .hunt-btn:disabled { color: #666; border-color: #444; cursor: wait; }
  h1 {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(22px, 6vw, 32px);
    letter-spacing: 2px;
    line-height: 1;
  }
  h1 .red { color: var(--red); }
  h1 .blue { color: var(--blue); }
  /* The X is the seam between the two teams — red left, blue right. The split
     point is nudged off 50% because the display font is slanted: a vertical
     cut at the box midpoint reads right-of-centre on the slanted glyph. */
  h1 .split {
    background: linear-gradient(90deg, var(--red) 0%, var(--red) 43%, var(--blue) 43%, var(--blue) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .rules-note {
    font-size: 9px;
    letter-spacing: 2px;
    opacity: 0.5;
    text-align: center;
    margin-bottom: 10px;
    padding: 4px 0;
    border-top: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .screen { flex: 1; display: none; flex-direction: column; padding: 12px; overflow-y: auto; }
  .screen.active { display: flex; }
  .selectors { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
  .pick-slot { border: 2px dashed var(--fg); padding: 8px; text-align: center; min-height: 48px; }
  .pick-slot.red { border-color: var(--red); color: var(--red); }
  .pick-slot.blue { border-color: var(--blue); color: var(--blue); }
  .pick-slot .label { font-size: 8px; letter-spacing: 2px; opacity: 0.7; }
  .pick-slot .name { font-family: 'Bungee', sans-serif; font-size: 13px; margin-top: 3px; }
  .turn-indicator { text-align: center; font-size: 10px; letter-spacing: 3px; padding: 6px; margin-bottom: 10px; border: 1px solid var(--fg); }
  .turn-indicator.odds { letter-spacing: 0.5px; font-size: 11px; }
  .turn-indicator.red { color: var(--red); border-color: var(--red); }
  .turn-indicator.blue { color: var(--blue); border-color: var(--blue); }
  .roster { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 10px; }
  .autopick { margin-bottom: 10px; }
  .autopick-label { font-family: 'Bungee', sans-serif; font-size: 8px; letter-spacing: 1.5px; opacity: 0.55; display: block; margin-bottom: 5px; }
  .autopick-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .ap-btn { font-family: 'Bungee', sans-serif; font-size: 9px; letter-spacing: 0.5px; padding: 8px 4px; background: #161616; color: var(--fg); border: 2px solid #333; cursor: pointer; transition: transform 0.08s, background 0.12s, border-color 0.12s; }
  .ap-btn:active { transform: scale(0.96); }
  #ap-coinflip:hover { border-color: var(--yellow); color: var(--yellow); }
  #ap-random:hover { border-color: var(--fg); }
  #ap-stomp:hover { border-color: var(--red); color: var(--red); }
  .fighter-card { background: #141414; border: 2px solid var(--fg); padding: 8px; cursor: pointer; transition: transform 0.08s, background 0.15s; position: relative; user-select: none; }
  .fighter-card:active { transform: scale(0.97); }
  .fighter-card.red-pick { background: var(--red); color: var(--bg); border-color: var(--red); }
  .fighter-card.blue-pick { background: var(--blue); color: var(--bg); border-color: var(--blue); }
  .fighter-card h3 { font-family: 'Bungee', sans-serif; font-size: 12px; letter-spacing: 1px; margin-bottom: 4px; }
  .fighter-card .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-bottom: 5px; padding: 3px 0; border-top: 1px solid currentColor; border-bottom: 1px solid currentColor; opacity: 0.85; }
  .fighter-card .stat { text-align: center; }
  .fighter-card .stat .k { font-family: 'Bungee', sans-serif; font-size: 7px; letter-spacing: 0.5px; opacity: 0.65; }
  .fighter-card .stat .v { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 11px; line-height: 1.1; }
  .fighter-card .ability { font-size: 9px; line-height: 1.35; }
  .fighter-card .ability .row { display: flex; gap: 4px; margin-top: 2px; }
  .fighter-card .ability .tag { font-family: 'Bungee', sans-serif; font-size: 7px; padding: 1px 3px; flex-shrink: 0; letter-spacing: 0.5px; }
  .fighter-card .ability .tag.act { background: var(--yellow); color: var(--bg); }
  .fighter-card .ability .tag.pas { background: var(--fg); color: var(--bg); }
  .fighter-card.red-pick .ability .tag.act, .fighter-card.blue-pick .ability .tag.act { background: var(--bg); color: var(--yellow); }
  .fighter-card.red-pick .ability .tag.pas, .fighter-card.blue-pick .ability .tag.pas { background: var(--bg); color: var(--fg); }
  .fighter-card .ability .text { opacity: 0.9; line-height: 1.25; }
  .pick-tag { position: absolute; top: -8px; right: -8px; background: var(--bg); color: var(--fg); font-family: 'Bungee', sans-serif; font-size: 9px; padding: 2px 5px; border: 2px solid currentColor; pointer-events: none; }
  button.cta { width: 100%; background: var(--yellow); color: var(--bg); border: 3px solid var(--fg); font-family: 'Bungee', sans-serif; font-size: 16px; letter-spacing: 2px; padding: 12px; cursor: pointer; transition: transform 0.08s; }
  button.cta:active { transform: scale(0.97); }
  button.cta:disabled { background: #333; color: #666; cursor: not-allowed; }
  #fight-screen { padding: 8px; }
  .hp-bars { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; margin-bottom: 8px; flex-shrink: 0; align-items: start; }
  /* Every child row is fixed-height (incl. the status row), so the block is a
     constant height regardless of badge count — neither side can shift. */
  .hp-block { min-height: 60px; }
  .fight-clock {
    font-family: 'Bungee', sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    opacity: 0.85;
    padding: 0 4px;
    align-self: start;
    margin-top: 14px;
  }
  /* .urgent is only ever the FOG clock — coloured the team-neutral fog purple
     (matching the fog fill, ring, and status badge), not red. */
  .fight-clock.urgent { color: #d25aff; animation: clockpulse 0.5s infinite; }
  @keyframes clockpulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
  .hp-block .name { font-family: 'Bungee', sans-serif; font-size: 11px; margin-bottom: 3px; }
  .name-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; min-height: 14px; }
  .name-row .name { margin-bottom: 0; }
  /* Status badges live in their OWN row beneath the hp-text, at a fixed
     reserved height — so badges appearing/expiring never resize the block,
     the name, the hp-bar, the other fighter's block, or the arena. */
  .status-row {
    display: flex;
    gap: 3px;
    flex-wrap: nowrap;
    height: 13px;
    margin-top: 2px;
    align-items: center;
    overflow: hidden;
  }
  .status-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 1px 4px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .hp-bar { height: 12px; background: #222; border: 2px solid var(--fg); overflow: hidden; }
  .hp-fill { height: 100%; transition: width 0.2s; }
  .hp-fill.red { background: var(--red); }
  .hp-fill.blue { background: var(--blue); }
  .hp-text { font-size: 9px; margin-top: 2px; opacity: 0.7; }
  .arena-wrap { flex: 1; position: relative; min-height: 0; display: flex; max-width: 360px; max-height: 360px; width: 100%; margin: 0 auto; }
  canvas {
    width: 100%; height: 100%;
    background: #060606;
    border: 2px solid var(--fg);
    display: block;
    background-image:
      linear-gradient(rgba(245,245,240,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,245,240,0.04) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  
  .controls { display: flex; gap: 8px; margin-top: 8px; flex-shrink: 0; }
  .controls button { flex: 1; background: transparent; color: var(--fg); border: 2px solid var(--fg); font-family: 'Bungee', sans-serif; font-size: 10px; letter-spacing: 1px; padding: 8px; cursor: pointer; }
  .controls button:active { background: var(--fg); color: var(--bg); }
  .winner-overlay { position: absolute; inset: 0; background: rgba(10,10,10,0.92); display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; z-index: 10; }
  .mtable-overlay { position: fixed; inset: 0; background: #0a0a0a; display: none; flex-direction: column; z-index: 12; padding: 12px; }
  .mtable-overlay.show { display: flex; animation: fadein 0.2s; }
  .mtable-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
  .mtable-title { font-family: 'Bungee', sans-serif; font-size: 13px; letter-spacing: 1px; }
  .mtable-hint { font-family: 'JetBrains Mono', monospace; font-size: 9px; opacity: 0.5; }
  .mtable-close { margin-left: auto; background: #161616; border: 2px solid #333; color: var(--fg); font-size: 12px; width: 28px; height: 28px; cursor: pointer; flex-shrink: 0; }
  .mtable-close:active { transform: scale(0.92); }
  .mtable-scroll { flex: 1; overflow: auto; min-height: 0; }
  #mtable-grid { border-collapse: collapse; font-family: 'JetBrains Mono', monospace; }
  #mtable-grid th { font-size: 7px; font-weight: 400; color: #888; padding: 2px; position: sticky; }
  #mtable-grid thead th { top: 0; background: #0a0a0a; z-index: 2; }
  #mtable-grid th.rowhead { left: 0; background: #0a0a0a; z-index: 1; text-align: right; padding-right: 3px; }
  #mtable-grid td { width: 19px; height: 19px; text-align: center; font-size: 8px; cursor: pointer; color: #fff; }
  #mtable-grid td.diag { background: #1a1a1a; color: #444; cursor: default; }
  #mtable-grid td.cell:active { outline: 2px solid var(--yellow); outline-offset: -2px; }
  .mtable-legend { display: flex; gap: 12px; justify-content: center; margin-top: 8px; font-family: 'JetBrains Mono', monospace; font-size: 9px; opacity: 0.7; }
  .mtable-legend span { display: flex; align-items: center; gap: 4px; }
  .mtable-legend i { width: 10px; height: 10px; display: inline-block; }
  .mrank-title { font-family: 'Bungee', sans-serif; font-size: 10px; letter-spacing: 1px; color: #888; margin: 16px 0 8px; }
  .mrank-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .mrank-rank { width: 16px; text-align: right; color: #666; flex-shrink: 0; }
  .mrank-name { width: 86px; flex-shrink: 0; }
  .mrank-bar { flex: 1; height: 12px; background: #1a1a1a; position: relative; min-width: 40px; }
  .mrank-fill { display: block; height: 100%; }
  .mrank-pct { width: 34px; text-align: right; flex-shrink: 0; }
  .sprite-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sprite-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 2px; background: #141414; cursor: pointer; }
  .sprite-cell canvas { width: 64px; height: 64px; }
  .sprite-cell span { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #aaa; }
  .sprite-cell.spinning { background: #1c2230; }
  /* ---- VS intro overlay ---- */
  .vs-intro {
    position: absolute; inset: 0; z-index: 11;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(8,8,12,0.96);
    overflow: hidden;
  }
  .vs-intro.show { display: flex; }
  .vs-side {
    display: flex; flex-direction: column; align-items: center;
    width: 47%;
  }
  .vs-red  { animation: vsSlideL 0.45s cubic-bezier(0.2,0.9,0.3,1.2) both; }
  .vs-blue { animation: vsSlideR 0.45s cubic-bezier(0.2,0.9,0.3,1.2) both; }
  @keyframes vsSlideL { from { transform: translateX(-130%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes vsSlideR { from { transform: translateX(130%);  opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .vs-sprite { width: 84px; height: 84px; }
  .vs-name {
    font-family: 'Bungee', sans-serif; font-size: 13px; letter-spacing: 1px;
    margin-top: 4px;
  }
  .vs-red  .vs-name { color: var(--red); }
  .vs-blue .vs-name { color: var(--blue); }
  .vs-ability {
    font-family: 'Bungee', sans-serif; font-size: 7px; letter-spacing: 0.3px;
    opacity: 0.85; margin-top: 3px; text-align: center; white-space: nowrap;
  }
  .vs-stats {
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    opacity: 0.7; margin-top: 4px; line-height: 1.5; text-align: center;
  }
  .vs-badge {
    position: absolute;
    font-family: 'Bungee', sans-serif; font-size: 44px;
    color: #fff;
    text-shadow: 0 0 12px rgba(255,255,255,0.5);
    animation: vsClash 0.5s cubic-bezier(0.3,1.6,0.5,1) 0.42s both;
  }
  @keyframes vsClash {
    0%   { transform: scale(3.5) rotate(-12deg); opacity: 0; }
    60%  { transform: scale(0.85) rotate(4deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .winner-overlay.show { display: flex; animation: fadein 0.3s; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .winner-eyebrow {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 6px; opacity: 0.55; margin-bottom: 6px;
    animation: winFade 0.4s 0.05s both;
  }
  .winner-sprite {
    width: 110px; height: 110px;
    animation: winSpritePop 0.5s 0.12s cubic-bezier(0.2,1.5,0.4,1) both;
  }
  .winner-overlay .winner-name {
    font-family: 'Bungee', sans-serif; font-size: 30px; letter-spacing: 3px;
    margin-top: 6px;
    animation: winSlam 0.45s 0.28s cubic-bezier(0.2,1.4,0.4,1) both;
  }
  @keyframes winFade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes winSpritePop { 0% { transform: scale(0) rotate(-30deg); } 100% { transform: scale(1) rotate(0deg); } }
  @keyframes winSlam {
    0%   { transform: scale(2.4); opacity: 0; }
    65%  { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  header { position: relative; }
  .mute-btn {
    display: block;
    margin: 4px auto 8px;
    background: transparent;
    color: var(--fg);
    border: 1px solid rgba(255,255,255,0.25);
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    letter-spacing: 1px;
    padding: 4px 10px;
    cursor: pointer;
    opacity: 0.55;
  }
  .mute-btn.on { opacity: 0.9; border-color: var(--fg); }
</style>
</head>
<body>

<header>
  <h1><span class="red">BO</span><span class="split">X</span><span class="blue">ED</span></h1>
</header>

<section class="screen active" id="select-screen">
  <div class="rules-note">FOG RING CLOSES IN AT 0:20 — LAST ONE LEFT WINS</div>
  <button id="mute-btn" class="mute-btn on" aria-label="toggle sound">SOUND: ON</button>
  <div class="selectors">
    <div class="pick-slot red">
      <div class="label">RED</div>
      <div class="name" id="slot-red-name">— EMPTY —</div>
    </div>
    <div class="pick-slot blue">
      <div class="label">BLUE</div>
      <div class="name" id="slot-blue-name">— EMPTY —</div>
    </div>
  </div>
  <div class="turn-indicator red" id="turn-indicator">PICKING: RED</div>
  <div class="autopick" id="autopick">
    <span class="autopick-label">AUTO MATCHUP</span>
    <div class="autopick-btns">
      <button class="ap-btn" id="ap-coinflip" data-mode="coinflip">COIN-FLIP</button>
      <button class="ap-btn" id="ap-random" data-mode="random">RANDOM</button>
      <button class="ap-btn" id="ap-stomp" data-mode="stomp">STOMP</button>
    </div>
    <div class="autopick-btns" style="margin-top:6px;">
      <button class="ap-btn" id="ap-table" style="grid-column:1/3;">MATCHUP TABLE</button>
      <button class="ap-btn" id="ap-sprites">SPRITE LIST</button>
    </div>
  </div>
  <div class="roster" id="roster"></div>
  <div class="mtable-overlay" id="mtable-overlay">
    <div class="mtable-head">
      <span class="mtable-title">MATCHUP TABLE</span>
      <span class="mtable-hint">tap a cell to pick that fight</span>
      <button class="mtable-close" id="mtable-close" aria-label="close">✕</button>
    </div>
    <div class="mtable-scroll">
      <table id="mtable-grid"></table>
      <div class="mrank-title">OVERALL WIN RATE</div>
      <div id="mrank-list"></div>
    </div>
    <div class="mtable-legend">
      <span><i style="background:#1f7a4d"></i>row wins</span>
      <span><i style="background:#3a3a3a"></i>even</span>
      <span><i style="background:#a83232"></i>row loses</span>
    </div>
  </div>
  <div class="mtable-overlay" id="sprite-overlay">
    <div class="mtable-head">
      <span class="mtable-title">SPRITE LIST</span>
      <span class="mtable-hint">tap to toggle rotation</span>
      <button class="mtable-close" id="sprite-close" aria-label="close">✕</button>
    </div>
    <div class="mtable-scroll"><div id="sprite-grid" class="sprite-grid"></div></div>
  </div>
</section>

<section class="screen" id="fight-screen">
  <div class="hp-bars">
    <div class="hp-block">
      <div class="name-row">
        <div class="name" id="fight-name-red" style="color: var(--red)">—</div>
      </div>
      <div class="hp-bar"><div class="hp-fill red" id="hp-red" style="width:100%"></div></div>
      <div class="hp-text" id="hp-text-red">100 / 100</div>
      <div class="status-row" id="status-red"></div>
    </div>
    <div class="fight-clock" id="fight-clock">0:20</div>
    <div class="hp-block">
      <div class="name-row" style="justify-content:flex-end">
        <div class="name" id="fight-name-blue" style="color: var(--blue)">—</div>
      </div>
      <div class="hp-bar"><div class="hp-fill blue" id="hp-blue" style="width:100%; margin-left:auto"></div></div>
      <div class="hp-text" id="hp-text-blue" style="text-align:right">100 / 100</div>
      <div class="status-row" id="status-blue" style="justify-content:flex-end"></div>
    </div>
  </div>
  <div class="arena-wrap" id="arena-wrap">
    <canvas id="canvas"></canvas>
    <div class="vs-intro" id="vs-intro">
      <div class="vs-side vs-red" id="vs-red">
        <canvas class="vs-sprite" id="vs-sprite-red" width="120" height="120"></canvas>
        <div class="vs-name" id="vs-name-red">—</div>
        <div class="vs-ability" id="vs-ability-red"></div>
        <div class="vs-stats" id="vs-stats-red"></div>
      </div>
      <div class="vs-badge" id="vs-badge">VS</div>
      <div class="vs-side vs-blue" id="vs-blue">
        <canvas class="vs-sprite" id="vs-sprite-blue" width="120" height="120"></canvas>
        <div class="vs-name" id="vs-name-blue">—</div>
        <div class="vs-ability" id="vs-ability-blue"></div>

<script>
// ============================================================================
// === SEEDED RNG =============================================================
// Every fight runs on a seed, so any fight is reproducible — note a seed and
// replay it exactly (great for recording, and for hunting rare upsets).
// Two streams off the master seed: `rng` drives GAMEPLAY (spawn angles,
// ability rolls, the Gambler's wildcard) — this determines the outcome;
// `vrng` drives cosmetic VISUALS (particles). Keeping them separate means a
// rendering tweak can't desync the fight. Audio jitter stays unseeded — it's
// irrelevant to outcome and replay.
// mulberry32 — small, fast, well-distributed 32-bit PRNG.
function mulberry32(seed) {
  let s = seed >>> 0;
  return function () {
    s = (s + 0x6D2B79F5) | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
let currentSeed = 0;       // the seed the active/most-recent fight used
let pendingSeed = null;    // if set, the next fight uses this seed (pinned)
let huntActive = false;    // true while an upset-hunt search is running
let headless = false;      // true during an upset-hunt: suppress all audio/
                           // visual side effects so step() runs as fast pure
                           // logic. The fight outcome is unaffected.
let rng = Math.random;     // gameplay stream — replaced per fight
let vrng = Math.random;    // visual stream — replaced per fight
// initSeededRng(seed): point both streams at a fresh PRNG built from `seed`.
// vrng is offset so the two streams don't march in lockstep.
function initSeededRng(seed) {
  currentSeed = seed >>> 0;
  rng = mulberry32(currentSeed);
  vrng = mulberry32((currentSeed ^ 0x9E3779B9) >>> 0);
}
// A fresh random seed (used when the player hasn't pinned one).
function randomSeed() { return (Math.random() * 0xFFFFFFFF) >>> 0; }

// ============================================================================
// === AUDIO ==================================================================
// Self-contained Web Audio synth. No files — every sound is generated from
// oscillators + noise + envelopes. sfx(name) plays a sound; muted by default.
// ============================================================================
const Audio = (() => {
  let ctx = null;
  let muted = false; // default ON — flip via the speaker toggle on the select screen

  // Lazily create the AudioContext on first use (browsers require a user
  // gesture before audio can start; the select-screen taps satisfy that).
  function ac() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { ctx = null; }
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // --- low-level voices -----------------------------------------------------

  // A pitched tone with an ADSR-ish envelope.
  function tone(freq, dur, type, vol, opts) {
    const c = ac(); if (!c) return;
    opts = opts || {};
    const t0 = c.currentTime;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type || 'sine';
    // Per-instance pitch variation — a few % of random detune so repeated
    // sounds (every hit, every cast) are never byte-identical. `exact` opts
    // out for sounds that need a precise pitch (e.g. the win fanfare).
    const vary = opts.exact ? 1 : (0.97 + Math.random() * 0.06);
    osc.frequency.setValueAtTime(freq * vary, t0);
    if (opts.glideTo) {
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, opts.glideTo * vary), t0 + dur);
    }
    const peak = (vol == null ? 0.3 : vol);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(peak, t0 + (opts.attack || 0.005));
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain);
    gain.connect(panNode(c, opts.pan));
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  // Returns a node to connect into: a StereoPanner (fed to master) when a pan
  // position is given, otherwise the master bus directly. pan is -1..1.
  // Falls back to _curPan — the pan set by the current sfx() call's x-position.
  let _curPan = null;
  let _arenaW = 0;
  function panNode(c, pan) {
    const master = masterGain();
    const p2 = (pan == null ? _curPan : pan);
    if (p2 == null || !c.createStereoPanner) return master;
    const p = c.createStereoPanner();
    p.pan.setValueAtTime(Math.max(-1, Math.min(1, p2)), c.currentTime);
    p.connect(master);
    return p;
  }

  // A burst of filtered white noise — used for impacts, whooshes, explosions.
  function noise(dur, vol, filterType, filterFreq, opts) {
    const c = ac(); if (!c) return;
    opts = opts || {};
    const t0 = c.currentTime;
    const frames = Math.floor(c.sampleRate * dur);
    const buf = c.createBuffer(1, frames, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < frames; i++) data[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource();
    src.buffer = buf;
    const filter = c.createBiquadFilter();
    filter.type = filterType || 'lowpass';
    // Per-instance variation — jitter the filter cutoff so repeated noise
    // bursts (hits, whooshes) have subtly different timbre each time.
    const vary = opts.exact ? 1 : (0.9 + Math.random() * 0.2);
    filter.frequency.setValueAtTime((filterFreq || 1000) * vary, t0);
    if (opts.filterGlideTo) {
      filter.frequency.exponentialRampToValueAtTime(Math.max(40, opts.filterGlideTo * vary), t0 + dur);
    }
    const gain = c.createGain();
    const peak = (vol == null ? 0.3 : vol);
    gain.gain.setValueAtTime(peak, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(panNode(c, opts.pan));
    src.start(t0);
    src.stop(t0 + dur + 0.02);
  }

  let _master = null;
  function masterGain() {
    const c = ac(); if (!c) return null;
    if (!_master) {
      _master = c.createGain();
      _master.gain.value = 0.55;
      // Limiter on the master bus — catches the peaks when several voices
      // stack in a chaotic frame so the mix never hard-clips into distortion.
      const limiter = c.createDynamicsCompressor();
      limiter.threshold.setValueAtTime(-3, c.currentTime);
      limiter.knee.setValueAtTime(0, c.currentTime);
      limiter.ratio.setValueAtTime(20, c.currentTime);
      limiter.attack.setValueAtTime(0.003, c.currentTime);
      limiter.release.setValueAtTime(0.12, c.currentTime);
      _master.connect(limiter);
      limiter.connect(c.destination);
    }
    return _master;
  }

  // --- sound definitions ----------------------------------------------------
  // Each entry is a function that builds one sound effect.
  const SOUNDS = {
    // Generic body-contact tick — soft and low so it doesn't dominate.
    contact() { noise(0.07, 0.12, 'lowpass', 380); },
    // A damaging hit. Punchier; pitch nudges up with bigger hits.
    hit(mag) {
      const m = mag || 10;
      noise(0.10, 0.30, 'lowpass', 600 + m * 14);
      tone(90 + m * 2, 0.12, 'triangle', 0.22, { glideTo: 50 });
    },
    // --- ability casts (one per archetype) ---
    lightning() { tone(1400, 0.18, 'sawtooth', 0.18, { glideTo: 320 }); noise(0.12, 0.12, 'highpass', 2000); },
    tackle()    { noise(0.22, 0.30, 'lowpass', 900, { filterGlideTo: 200 }); tone(160, 0.2, 'square', 0.16, { glideTo: 70 }); },
    cast()      { tone(520, 0.22, 'sine', 0.16, { glideTo: 880 }); tone(780, 0.22, 'sine', 0.10, { glideTo: 1320 }); },
    sword()     { noise(0.16, 0.26, 'bandpass', 2600); tone(420, 0.12, 'triangle', 0.12, { glideTo: 220 }); },
    mine()      { tone(880, 0.08, 'square', 0.16); tone(1240, 0.06, 'square', 0.10, { attack: 0.04 }); },
    arrow()     { noise(0.09, 0.16, 'bandpass', 3200); tone(900, 0.07, 'triangle', 0.10, { glideTo: 1500 }); },
    blink()     { tone(1600, 0.14, 'sine', 0.14, { glideTo: 400 }); tone(400, 0.14, 'sine', 0.10, { glideTo: 1600 }); },
    cannon()    { noise(0.4, 0.5, 'lowpass', 700, { filterGlideTo: 90 }); tone(120, 0.4, 'square', 0.3, { glideTo: 40 }); },
    riposte()   { tone(1800, 0.1, 'triangle', 0.12, { glideTo: 900 }); noise(0.1, 0.18, 'bandpass', 4000); },
    scythe()    { tone(300, 0.3, 'sawtooth', 0.13, { glideTo: 120 }); noise(0.18, 0.12, 'lowpass', 500); },
    sweep()     { noise(0.26, 0.28, 'bandpass', 1800, { filterGlideTo: 600 }); tone(360, 0.22, 'triangle', 0.12, { glideTo: 180 }); },
    iai()       { tone(1500, 0.5, 'sine', 0.10, { glideTo: 3000, attack: 0.3 }); }, // rising tension hum
    // Wind-up telegraphs — a rising charge that builds into the release sound.
    chargeUp()  { tone(400, 0.42, 'triangle', 0.09, { glideTo: 1500, attack: 0.2 }); }, // Priest lightning charge
    chargeBig() { tone(70, 0.95, 'sawtooth', 0.10, { glideTo: 240, attack: 0.5 }); noise(0.95, 0.06, 'lowpass', 200, { filterGlideTo: 600 }); }, // Cannoneer cannon charge
    iaiStrike() { noise(0.14, 0.36, 'bandpass', 3400); tone(700, 0.14, 'triangle', 0.18, { glideTo: 200 }); },
    hex()       { tone(620, 0.26, 'sawtooth', 0.13, { glideTo: 380 }); tone(930, 0.26, 'sine', 0.07, { glideTo: 570 }); },
    grapple()   { noise(0.16, 0.2, 'bandpass', 1400); tone(240, 0.16, 'square', 0.12, { glideTo: 520 }); },
    yank()      { tone(200, 0.18, 'square', 0.18, { glideTo: 520 }); noise(0.14, 0.18, 'lowpass', 900); },
    drain()     { tone(180, 1.2, 'sawtooth', 0.09, { glideTo: 300, attack: 0.08 }); tone(540, 1.2, 'sine', 0.05, { glideTo: 700 }); noise(1.2, 0.04, 'bandpass', 1200); }, // sustained leech beam, spans the 1.2s channel
    wildcard()  { tone(330, 0.12, 'square', 0.12, { glideTo: 660 }); tone(495, 0.14, 'square', 0.10, { glideTo: 990 }); },
    // Gambler die settling on its face — a short hard clack (dice on a table).
    diceLand()  { noise(0.07, 0.16, 'bandpass', 2200); tone(180, 0.08, 'square', 0.16, { glideTo: 90 }); },
    // High roll (5-6) — the clack plus a bright rising sparkle to signal luck.
    diceLandBig(){ noise(0.08, 0.18, 'bandpass', 2400); tone(200, 0.09, 'square', 0.18, { glideTo: 100 }); tone(900, 0.22, 'triangle', 0.12, { glideTo: 1700 }); },
    // A thrown coin — a light, bright metallic ting with a quick upward flip.
    coinThrow() { tone(1300, 0.1, 'triangle', 0.09, { glideTo: 1900 }); tone(2000, 0.07, 'sine', 0.05); },
    // --- reactions ---
    parry()     { tone(2600, 0.16, 'triangle', 0.22, { glideTo: 1600 }); tone(3300, 0.12, 'sine', 0.12); },
    negate()    { noise(0.14, 0.16, 'highpass', 1800, { filterGlideTo: 5000 }); }, // soft whiff
    heal()      { tone(560, 0.22, 'sine', 0.12, { glideTo: 840 }); },
    // --- lifecycle ---
    death()     { noise(0.5, 0.4, 'lowpass', 1200, { filterGlideTo: 80 }); tone(300, 0.5, 'sawtooth', 0.2, { glideTo: 50 }); },
    koHit()     { noise(0.35, 0.55, 'lowpass', 1600, { filterGlideTo: 60 }); tone(150, 0.45, 'square', 0.4, { glideTo: 38 }); tone(70, 0.5, 'sine', 0.3, { glideTo: 30 }); },
    select()    { tone(700, 0.08, 'sine', 0.18, { glideTo: 1000 }); },
    start()     { tone(440, 0.14, 'square', 0.16, { glideTo: 660, exact: true }); setTimeout(() => tone(880, 0.18, 'square', 0.16, { exact: true }), 130); },
    win()       {
      [523, 659, 784, 1046].forEach((f, i) => setTimeout(() => tone(f, 0.3, 'triangle', 0.2, { exact: true }), i * 110));
    },
  };

  return {
    // play(name, arg, x) — optional x is an arena x-coordinate (0..arenaW);
    // it's converted to a stereo pan so the sound comes from where it happened.
    play(name, arg, x) {
      if (muted) return;
      const fn = SOUNDS[name];
      if (!fn) return;
      _curPan = (x == null || !_arenaW) ? null
              : Math.max(-1, Math.min(1, (x / _arenaW) * 2 - 1)) * 0.7;
      try { fn(arg); } catch (e) {}
      _curPan = null;
    },
    setArenaWidth(w) { _arenaW = w; },
    isMuted() { return muted; },
    toggle() {
      muted = !muted;
      if (!muted) ac(); // unlock context on un-mute
      return muted;
    },
  };
})();
function sfx(name, arg, x) { if (headless) return; Audio.play(name, arg, x); }

  'witch_warlock':55, 'witch_gambler':44, 'hunter_warlock':56, 'hunter_gambler':48, 'warlock_gambler':51,
};

// matchupOdds(a, b) — fighter A's win % vs B, in either stored direction.
function matchupOdds(a, b) {
  if (a === b) return 50;
  if (MATCHUPS[a + '_' + b] != null) return MATCHUPS[a + '_' + b];
  if (MATCHUPS[b + '_' + a] != null) return 100 - MATCHUPS[b + '_' + a];
  return 50;
}

// allMatchups() — every unordered pair with its odds, as {a, b, odds, spread}.
// `spread` is how lopsided the fight is (0 = perfect 50/50, 50 = total stomp).
function allMatchups() {
  const ids = FIGHTERS.map(f => f.id), out = [];
  for (let i = 0; i < ids.length; i++) {
    for (let j = i + 1; j < ids.length; j++) {
      const odds = matchupOdds(ids[i], ids[j]);
      out.push({ a: ids[i], b: ids[j], odds, spread: Math.abs(odds - 50) });
    }
  }
  return out;
}

function onPick(id) {
  // Tapping any selected fighter deselects it, regardless of whose turn it is
  if (pickRed === id) { pickRed = null; updateUI(); sfx('select'); return; }
  if (pickBlue === id) { pickBlue = null; updateUI(); sfx('select'); return; }

  else { pickBlue = id; turn = 'red'; }

}
function updateUI() {
  const r = FIGHTERS.find(g => g.id === pickRed);
  const b = FIGHTERS.find(g => g.id === pickBlue);
  slotRedName.textContent = r ? r.name : '— EMPTY —';
  slotBlueName.textContent = b ? b.name : '— EMPTY —';
  if (!pickRed) { turn='red'; turnInd.textContent='PICKING: RED'; turnInd.className='turn-indicator red'; }
  else if (!pickBlue) { turn='blue'; turnInd.textContent='PICKING: BLUE'; turnInd.className='turn-indicator blue'; }
  else {
    // Both picked — show the sim's odds for this matchup (select screen only;
    // never appears in a recording, which starts at the VS intro).
    const ro = matchupOdds(pickRed, pickBlue);
    turnInd.textContent = 'ODDS  ' + r.name + ' ' + ro + '%  ·  ' + b.name + ' ' + (100 - ro) + '%';
    turnInd.className = 'turn-indicator odds';

  const huntBtn = document.getElementById('hunt-btn');
  const huntTightBtn = document.getElementById('hunt-tight-btn');
  if (huntActive) { renderRoster(); return; }
  if (pickRed && pickBlue) {

      const under = ro < 50 ? r : b;
      const underPct = ro < 50 ? ro : 100 - ro;
      huntBtn.textContent = 'HUNT THE UPSET — ' + under.name + ' ' + underPct + '%';
      huntBtn.dataset.underdog = under.id;

    huntTightBtn.textContent = 'HUNT A TIGHT FIGHT';

// Canvas setup, game object, fighter instantiation, HP UI sync, main loop,
// arena bounce, distance helper. The game loop calls step() then draw().

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let game = null;
// Generation counter — each startFight bumps it. loop() captures its game's
// token and stops the moment a newer fight has begun, killing stale RAF chains.
let fightToken = 0;

// The simulation always runs in a fixed 360x360 reference space, so a fight
// is device-independent (and the headless hunt reproduces exactly). The
// renderer scales this reference space to whatever the actual canvas size is.
const ARENA = 360;
function resizeCanvas() {
  const r = canvas.getBoundingClientRect();
  canvas.width = r.width * window.devicePixelRatio;
  canvas.height = r.height * window.devicePixelRatio;
  // Map 360 reference units onto the canvas's CSS pixels, then DPR on top.
  const scale = (r.width / ARENA) * window.devicePixelRatio;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

// --- Auto matchup picker --------------------------------------------------
// Picks a matchup of a chosen type from the embedded sim data and selects the
// two fighters — but does NOT start the fight. You see the odds, can re-roll,
// and hit FIGHT when ready.
//   coinflip — near 50/50 (spread <= 8): genuine nail-biters
//   stomp    — lopsided (spread >= 25): underdog / "can they survive" content
//   random   — any matchup at all
function autoPick(mode) {
  huntActive = false; // cancel any running upset-hunt
  let pool = allMatchups();
  if (mode === 'coinflip') pool = pool.filter(m => m.spread <= 8);
  else if (mode === 'stomp') pool = pool.filter(m => m.spread >= 25);
  // random uses the full pool. Guard: if a filter somehow empties, fall back.
  if (!pool.length) pool = allMatchups();
  const m = pool[Math.floor(Math.random() * pool.length)];
  // Randomize which side (red/blue) each fighter takes so it's not always
  // "stored-A on red". Visual variety only — sides don't affect balance.
  if (Math.random() < 0.5) { pickRed = m.a; pickBlue = m.b; }
  else { pickRed = m.b; pickBlue = m.a; }
  turn = 'red';
  sfx('select');
  updateUI();
}
document.querySelectorAll('.ap-btn[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => autoPick(btn.dataset.mode));
});

// --- Matchup table overlay ------------------------------------------------
// A 16x16 grid of every matchup's win rate, from the embedded MATCHUPS data.
// Each cell shows the ROW fighter's win % vs the COLUMN fighter; tapping a
// cell selects that matchup and closes the overlay. Built once, lazily.
const mtableOverlay = document.getElementById('mtable-overlay');
let mtableBuilt = false;
function mtableCellColor(v) {
  // Green (row wins) -> dark grey (even) -> red (row loses).
  if (v >= 50) {
    const t = (v - 50) / 50;            // 0..1
    return 'rgb(' + Math.round(58 - t * 27) + ',' + Math.round(58 + t * 64) + ',' + Math.round(58 - t * 19) + ')';
  }
  const t = (50 - v) / 50;
  return 'rgb(' + Math.round(58 + t * 110) + ',' + Math.round(58 - t * 8) + ',' + Math.round(58 - t * 8) + ')';
}
function buildMatchupTable() {
  const ids = FIGHTERS.map(f => f.id);
  const abbr = id => id.slice(0, 3).toUpperCase();
  const grid = document.getElementById('mtable-grid');
  let html = '<thead><tr><th class="rowhead"></th>';
  ids.forEach(c => { html += '<th>' + abbr(c) + '</th>'; });
  html += '</tr></thead><tbody>';
  ids.forEach(r => {
    html += '<tr><th class="rowhead">' + abbr(r) + '</th>';
    ids.forEach(c => {
      if (r === c) { html += '<td class="diag">·</td>'; return; }
      const v = matchupOdds(r, c);
      html += '<td class="cell" data-r="' + r + '" data-c="' + c + '" '
            + 'style="background:' + mtableCellColor(v) + '">' + v + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody>';
  grid.innerHTML = html;
  // Ranked list — each fighter's average win rate across all 15 opponents.
  const ranked = ids.map(id => {
    let sum = 0;
    ids.forEach(o => { if (o !== id) sum += matchupOdds(id, o); });
    return { id, wr: Math.round(sum / (ids.length - 1) * 10) / 10 };
  }).sort((a, b) => b.wr - a.wr);
  // Bars are rescaled to the ACTUAL spread: every fighter sits near 50%, so a
  // raw 0-100% bar would make all 16 look identical. Instead the weakest maps
  // to a short bar and the strongest to a full bar — the real spread fills the
  // width. Colour is a bright green->red ramp across that same range so the
  // bars are readable (the grid's cell scale is near-grey at 50% — wrong here).
  const wrs = ranked.map(r => r.wr);
  const lo = Math.min(...wrs), hi = Math.max(...wrs);
  const span = (hi - lo) || 1;
  const rankBar = wr => {
    const t = (wr - lo) / span;                 // 0 (weakest) .. 1 (strongest)
    const width = 12 + t * 88;                  // 12%..100% — weakest still visible
    const r = Math.round(210 - t * 150);        // bright red -> bright green
    const g = Math.round(70 + t * 130);
    const b = 70;
    return { width, color: 'rgb(' + r + ',' + g + ',' + b + ')' };
  };
  const rankEl = document.getElementById('mrank-list');
  rankEl.innerHTML = ranked.map((r, i) => {
    const fr = FIGHTERS.find(f => f.id === r.id);
    const bar = rankBar(r.wr);
    return '<div class="mrank-row">'
      + '<span class="mrank-rank">' + (i + 1) + '</span>'
      + '<span class="mrank-name">' + fr.name + '</span>'
      + '<span class="mrank-bar"><span class="mrank-fill" style="width:'
        + bar.width.toFixed(1) + '%;background:' + bar.color + '"></span></span>'
      + '<span class="mrank-pct">' + r.wr.toFixed(1) + '%</span>'
      + '</div>';
  }).join('');
  // One delegated listener — tap a cell to pick that matchup.
  grid.addEventListener('click', e => {
    const td = e.target.closest('td.cell');
    if (!td) return;
    pickRed = td.dataset.r;
    pickBlue = td.dataset.c;
    turn = 'red';
    mtableOverlay.classList.remove('show');
    sfx('select');
    updateUI();
  });
  mtableBuilt = true;
}
document.getElementById('ap-table').addEventListener('click', () => {
  if (!mtableBuilt) buildMatchupTable();
  mtableOverlay.classList.add('show');
});
document.getElementById('mtable-close').addEventListener('click', () => {
  mtableOverlay.classList.remove('show');
});

// --- Sprite gallery -------------------------------------------------------
// A 4x4 grid of every fighter's sprite, drawn through the real drawShape path
// (same as the VS intro) so the audit shows exactly what the game renders.
// Tap a cell to spin that sprite — rotation exposes the "no real forward axis"
// sprites (flask, hat) that look fine upright but tip when aiming.
const spriteOverlay = document.getElementById('sprite-overlay');
let spriteAnimRunning = false;
const spinningSprites = new Set();   // ids currently rotating

function drawGallerySprite(canvas, t, angle) {
  const c = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  if (canvas.width !== 64 * dpr) { canvas.width = 64 * dpr; canvas.height = 64 * dpr; }
  c.setTransform(dpr, 0, 0, dpr, 0, 0);
  c.clearRect(0, 0, 64, 64);
  const spriteF = { size: 16, color: t.color, accent: t.accent, shape: t.shape,
                    facing: angle, team: 'red' };
  c.save();
  c.translate(32, 32);
  if (angle) c.rotate(angle);
  c.fillStyle = spriteF.color;
  drawShape(c, spriteF);
  c.restore();
}

function spriteGalleryLoop() {
  if (!spriteOverlay.classList.contains('show')) { spriteAnimRunning = false; return; }
  if (spinningSprites.size > 0) {
    const angle = (performance.now() / 1000) % (Math.PI * 2);
    spinningSprites.forEach(id => {
      const cv = document.querySelector('.sprite-cell[data-id="' + id + '"] canvas');
      if (cv) drawGallerySprite(cv, FIGHTERS.find(f => f.id === id), angle);
    });
  }
  requestAnimationFrame(spriteGalleryLoop);
}

function buildSpriteGallery() {
  const grid = document.getElementById('sprite-grid');
  grid.innerHTML = '';
  FIGHTERS.forEach(t => {
    const cell = document.createElement('div');
    cell.className = 'sprite-cell';
    cell.dataset.id = t.id;
    const cv = document.createElement('canvas');
    const label = document.createElement('span');
    label.textContent = t.name;
    cell.appendChild(cv);
    cell.appendChild(label);
    grid.appendChild(cell);
    drawGallerySprite(cv, t, 0);
    // Tap toggles rotation for this sprite (audit its behavior when aiming).
    cell.addEventListener('click', () => {
      if (spinningSprites.has(t.id)) {
        spinningSprites.delete(t.id);
        cell.classList.remove('spinning');
        drawGallerySprite(cv, t, 0);   // snap back to upright
      } else {
        spinningSprites.add(t.id);
        cell.classList.add('spinning');
        if (!spriteAnimRunning) { spriteAnimRunning = true; spriteGalleryLoop(); }
      }
    });
  });
}

document.getElementById('ap-sprites').addEventListener('click', () => {
  // Rebuild every open — cheap (16 small canvases) and ensures the gallery
  // always reflects the current sprite code. As an audit tool it must never
  // show a stale render.
  buildSpriteGallery();
  spriteOverlay.classList.add('show');
});
document.getElementById('sprite-close').addEventListener('click', () => {
  spriteOverlay.classList.remove('show');
  spinningSprites.clear();
  // Reset every cell to upright so reopening starts clean.
  document.querySelectorAll('.sprite-cell').forEach(cell => {
    cell.classList.remove('spinning');
    const cv = cell.querySelector('canvas');
    if (cv) drawGallerySprite(cv, FIGHTERS.find(f => f.id === cell.dataset.id), 0);
  });
});

// --- Upset hunt -----------------------------------------------------------
// Searches random seeds (running the fight headless) until it finds one where
// the underdog wins, then pins that seed. Hit FIGHT to watch the upset.
// The search runs in small chunks, yielding to the browser between each so
// the page stays responsive and shows progress. Tapping again cancels.
const huntBtn = document.getElementById('hunt-btn');
const HUNT_CHUNK = 150;   // fights per chunk before yielding (~0.5s of work)
const HUNT_MAX = 8000;    // overall search budget — generous; chunked yielding
                          // means a long/hopeless hunt no longer freezes the
                          // page, so the cap can be high without a freeze tax.

huntBtn.addEventListener('click', async () => {
  // Second tap while hunting = cancel.
  if (huntActive) { huntActive = false; return; }
  const wantId = huntBtn.dataset.underdog;
  if (!wantId || !pickRed || !pickBlue) return;
  const under = FIGHTERS.find(f => f.id === wantId);
  huntActive = true;
  let found = null, total = 0;
  while (huntActive && !found && total < HUNT_MAX) {
    found = huntUpset(pickRed, pickBlue, wantId, HUNT_CHUNK);
    total += HUNT_CHUNK;
    if (found) break;
    // Show progress, then yield a frame so the label paints and taps register.
    huntBtn.textContent = 'HUNTING… ' + total + '  (tap to cancel)';
    await new Promise(r => requestAnimationFrame(r));
  }
  const wasCancelled = !huntActive && !found;
  huntActive = false;
  if (found) {
    seedInput.value = String(found.seed);
    pendingSeed = found.seed;
    huntBtn.textContent = 'FOUND — ' + under.name + ' WINS · TAP FIGHT';
  } else if (wasCancelled) {
    huntBtn.textContent = 'HUNT CANCELLED';
    setTimeout(updateUI, 1500); // restore the normal label
  } else {
    huntBtn.textContent = 'NO UPSET IN ' + HUNT_MAX + ' TRIES';
    setTimeout(updateUI, 2500);
  }
});

const huntTightBtn = document.getElementById('hunt-tight-btn');
huntTightBtn.addEventListener('click', async () => {
  // Second tap while hunting = cancel.
  if (huntActive) { huntActive = false; return; }
  if (!pickRed || !pickBlue) return;
  huntActive = true;
  let result = { found: false, best: null }, total = 0;
  while (huntActive && !result.found && total < HUNT_MAX) {
    result = huntTight(pickRed, pickBlue, HUNT_CHUNK, result.best);
    total += HUNT_CHUNK;
    if (result.found) break;
    huntTightBtn.textContent = 'HUNTING… ' + total + '  (tap to cancel)';
    await new Promise(r => requestAnimationFrame(r));
  }
  const wasCancelled = !huntActive && !result.found;
  huntActive = false;
  // result.best is always the closest fight seen — and when found, it IS the
  // tight one. Use it directly.
  const pick = (result.best && !wasCancelled) ? result.best : null;
  if (pick) {
    seedInput.value = String(pick.seed);
    pendingSeed = pick.seed;
    const wf = FIGHTERS.find(f => f.id === pick.winId);
    const tag = result.found ? 'TIGHT' : 'CLOSEST';
    // e.g. "TIGHT — KNIGHT WINS ON 14 HP (vs 25 dmg) · TAP FIGHT"
    huntTightBtn.textContent = tag + ' — ' + wf.name + ' WINS ON '
      + Math.round(pick.winnerHp) + ' HP (vs ' + pick.loserDmg + ' DMG) · TAP FIGHT';
  } else if (wasCancelled) {
    huntTightBtn.textContent = 'HUNT CANCELLED';
    setTimeout(updateUI, 1500);
  } else {
    huntTightBtn.textContent = 'NO TIGHT FIGHT FOUND';
    setTimeout(updateUI, 2500);
  }
});

// returnToSelect() — tear down the fight and show the character-select screen.
// Used by the BACK button and by the auto-return timer after a victory.
function returnToSelect() {
  stopGame();
  document.getElementById('vs-intro').classList.remove('show');
  document.getElementById('winner-overlay').classList.remove('show');
  document.getElementById('fight-screen').classList.remove('active');
  document.getElementById('select-screen').classList.add('active');
  document.getElementById('app-footer').classList.add('show');
}
document.getElementById('back-btn').addEventListener('click', returnToSelect);

// buildGame(redT, blueT) — construct a fresh fight state. Used by both the
// live startFight and the headless upset-hunt so they build identical games.
// Arena is the fixed 360x360 square (the live canvas is always this arena).
function buildGame(redT, blueT) {
  const w = 360, h = 360;
  fightToken++;
  return {
    w, h,
    token: fightToken,
    red: makeFighter(redT, 'red', w * 0.2, h * 0.5),
    blue: makeFighter(blueT, 'blue', w * 0.8, h * 0.5),
    projectiles: [], minions: [], mines: [], skeletons: [], particles: [], floatTexts: [], wakes: [],
    over: false, finishTimer: 0, winner: null, elapsed: 0, ringRadius: 999, lastT: performance.now(),
    timeScale: 1, koTimer: 0, acc: 0,
    shakeTime: 0, shakeMag: 0, hitStop: 0, flashFrame: 0,
    introPlaying: true,
  };
}

// simulateFight(redId, blueId, seed) — run a whole fight headless (no render,
// no audio) and return the winning fighter's id. Fully deterministic: the
// same seed always yields the same winner, and watching that seed live
// reproduces this exact fight.
function simulateFight(redId, blueId, seed) {
  return simulateFightDetailed(redId, blueId, seed).winId;
}

// simulateFightDetailed(redId, blueId, seed) — same headless run, but returns
// { winId, loseId, winnerHp, elapsed }. winnerHp is the WINNER's remaining HP
// (absolute) when the fight ended; loseId is the loser. Together they let a
// caller judge closeness against the loser's hit damage. elapsed = seconds.
function simulateFightDetailed(redId, blueId, seed) {
  const redT = FIGHTERS.find(g => g.id === redId);
  const blueT = FIGHTERS.find(g => g.id === blueId);
  const prevGame = game, prevHeadless = headless;
  headless = true;
  initSeededRng(seed);
  game = buildGame(redT, blueT);
  game.introPlaying = false; // no intro in a headless run
  let guard = 0;
  // ~30s fight cap at 60fps = 1800 ticks; +finish window. 4000 is safe headroom.
  while (!game.over && guard < 4000) { advance(); guard++; }
  const winner = game.winner;
  const winId = winner ? winner.id : null;
  const loser = winner ? (winner === game.red ? game.blue : game.red) : null;
  const loseId = loser ? loser.id : null;
  const winnerHp = winner ? Math.max(0, winner.hp) : 0;
  const elapsed = game.elapsed || 0;
  // Restore live state — the hunt must not disturb the real game.
  game = prevGame;
  headless = prevHeadless;
  return { winId, loseId, winnerHp, elapsed };
}

// huntUpset(redId, blueId, wantId, maxTries) — search random seeds until one
// produces a win for `wantId`. Returns { seed, tries } or null if not found.
function huntUpset(redId, blueId, wantId, maxTries) {
  for (let i = 1; i <= maxTries; i++) {
    const seed = randomSeed();
    if (simulateFight(redId, blueId, seed) === wantId) return { seed, tries: i };
  }
  return null;
}

// huntTight(redId, blueId, maxTries, best) — search random seeds for a
// nail-biter: a fight where the WINNER finished on HP at or below the LOSER's
// hit damage, i.e. one more clean hit from the loser would have killed them.
// `best` carries the closest fight across chunked calls (closeness = winnerHp
// minus loserDmg; <= 0 means tight). Returns { seed, found, best }; best is
// shaped { seed, winnerHp, loserDmg, margin, elapsed, winId }.
function huntTight(redId, blueId, maxTries, best) {
  for (let i = 1; i <= maxTries; i++) {
    const seed = randomSeed();
    const r = simulateFightDetailed(redId, blueId, seed);
    if (r.winId == null || r.loseId == null) continue; // skip any non-result
    const loser = FIGHTERS.find(g => g.id === r.loseId);
    const loserDmg = loser.dmg;
    const margin = r.winnerHp - loserDmg; // <= 0 means one hit would have killed
    if (!best || margin < best.margin) {
      best = { seed, winnerHp: r.winnerHp, loserDmg, margin, elapsed: r.elapsed, winId: r.winId };
    }
    if (margin <= 0) {
      return { seed, found: true, best };
    }
  }
  return { seed: null, found: false, best };
}

function makeFighter(t, team, x, y) {
  const a = rng() * Math.PI * 2;
  return {
    ...t, team, maxHp: t.hp, x, y,
    baseSpeed: t.speed,
    vx: Math.cos(a) * t.speed,
    vy: Math.sin(a) * t.speed,
    cdTimer: t.cd * 0.5 + rng() * 0.5,
    swingTimer: 0, dashTimer: 0, dashHit: false, flash: 0, negateFlash: 0, dead: false,
    aimTimer: 0, aimAngle: 0, aimAbility: null,
    shotCount: 0, trail: [],
    slowTimer: 0, stunTimer: 0,
    // Jester
    dodgeReady: true, dodgeTimer: 0, dodgeInvuln: 0, blinkFx: 0,
    blinkFromX: 0, blinkFromY: 0,
    // Duelist
    stillTimer: 0, lastX: x, lastY: y, enGarde: true, enGardeCd: 0,
    parryTimer: 0,
    // Reaper
    sweepTimer: 0, sweepHit: false,
    // Ronin
    iaiWindup: 0, iaiStrike: 0, iaiHit: false, iaiTrail: null,
    // Witch mark target timer (any fighter can carry the mark)
    witchMarkTimer: 0,
    // Hunter tether state — the 0.3s reel-in tween after a hook connects.
    tetherTimer: 0, tetherTarget: null, tetherStartX: 0, tetherStartY: 0,
    // Warlock drain beam channel state
    drainTimer: 0, drainTickTimer: 0, drainTarget: null, drainElapsed: 0, drainWhiffed: false,
    // Gambler — WILDCARD die roll. gamblerRoll is the face shown (1-6) while
    // the die tumbles + after it settles; gamblerShots is a queue of timed
    // coin shots (for the faces that fire over time); gamblerRefund flags a
    // low roll (1-2) that halves the next cooldown.
    gamblerRoll: 0, gamblerShots: [], gamblerRefund: false, gamblerSpeedTimer: 0, loadedTimer: 0,
  };
}

function startFight() {
  huntActive = false; // cancel any running upset-hunt
  // Seed: use a pinned seed if the player set one, else roll a fresh seed.
  // Either way the fight is now fully reproducible from `currentSeed`.
  initSeededRng(pendingSeed != null ? pendingSeed : randomSeed());
  syncSeedDisplay(); // reflect the seed used; pins it so RESTART replays it
  document.getElementById('select-screen').classList.remove('active');
  document.getElementById('fight-screen').classList.add('active');
  document.getElementById('winner-overlay').classList.remove('show');
  document.getElementById('app-footer').classList.remove('show');
  resizeCanvas();
  const redT = FIGHTERS.find(g => g.id === pickRed);
  const blueT = FIGHTERS.find(g => g.id === pickBlue);
  // Stop any previous fight's loop dead — bump the generation token so a stale
  // requestAnimationFrame callback from the old fight bails immediately.
  game = buildGame(redT, blueT);
  const w = game.w, h = game.h;
  Audio.setArenaWidth(w); // so positional sounds pan correctly
  document.getElementById('fight-name-red').textContent = redT.name;
  document.getElementById('fight-name-blue').textContent = blueT.name;
  // Clear any status badges left over from a previous fight
  ['status-red', 'status-blue'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.innerHTML = ''; el.dataset.key = ''; }
  });
  updateHp();
  draw(); // paint the opening arena state under the intro overlay
  playVsIntro(redT, blueT);
}

// VS intro — slides both fighters in, slams a "VS", holds, then starts the fight.
function playVsIntro(redT, blueT) {
  const intro = document.getElementById('vs-intro');
  const myGame = game; // capture — if a new fight starts, this won't match
  // Fill each side
  const fillSide = (side, t) => {
    document.getElementById('vs-name-' + side).textContent = t.name;
    // Ability line = active name · passive name (the part of each string
    // before the "—"). E.g. "RIPOSTE THRUST · EN GARDE".
    const actName = t.active.split('—')[0].trim();
    const pasName = t.passive.split('—')[0].trim();
    document.getElementById('vs-ability-' + side).textContent =
      actName + ' · ' + pasName;
    document.getElementById('vs-stats-' + side).innerHTML =
      'HP ' + t.hp + ' &nbsp; SPD ' + t.speed + '<br>DMG ' + t.dmg + ' &nbsp; CD ' + t.cd + 's';
    drawVsEmblem(document.getElementById('vs-sprite-' + side), { ...t, side });
  };
  fillSide('red', redT);
  fillSide('blue', blueT);
  // Restart the slide/clash animations by re-adding the class
  intro.classList.remove('show');
  void intro.offsetWidth; // force reflow so the animation replays
  intro.classList.add('show');
  sfx('select'); // whoosh-ish blip as the panels slam in
  setTimeout(() => { if (game === myGame) sfx('start'); }, 420);
  // Hold the intro ~2.4s total, then clear it and begin the fight.
  setTimeout(() => {
    // Bail if the player restarted / went back during the intro.
    if (game !== myGame) return;
    intro.classList.remove('show');
    game.introPlaying = false;
    game.lastT = performance.now(); // reset so elapsed doesn't jump
    loop();
  }, 2400);
}

// Draws the actual fighter sprite onto an intro canvas, with a soft accent-ring
// backing so it reads well at intro scale.
function drawVsEmblem(cnv, t) {
  const c = cnv.getContext('2d');
  const W = cnv.width, H = cnv.height, cx = W / 2, cy = H / 2;
  c.clearRect(0, 0, W, H);
  // Team-colored ring (red / blue) — the border always means "which side",
  // matching the in-fight sprite borders. The fighter's own accent still
  // shows inside the sprite (stars, emblems), just not as the ring.
  const teamColor = t.side === 'blue' ? '#2e9eff' : '#ff2e2e';
  // Soft backing disc
  const R = W * 0.42;
  c.fillStyle = 'rgba(255,255,255,0.04)';
  c.beginPath();
  c.arc(cx, cy, R, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = teamColor;
  c.lineWidth = 3;
  c.globalAlpha = 0.6;
  c.beginPath();
  c.arc(cx, cy, R, 0, Math.PI * 2);
  c.stroke();
  c.globalAlpha = 1;
  // Real sprite — drawShape draws in local space, so translate to center.
  // Build a minimal fighter-like object: drawShape only reads size/color/accent/shape.
  const spriteF = { size: W * 0.26, color: t.color, accent: t.accent, shape: t.shape };
  c.save();
  c.translate(cx, cy);
  // Blue sits on the right of the VS — flip it so its forward edge faces inward.
  if (t.side === 'blue') c.scale(-1, 1);
  c.fillStyle = spriteF.color;
  drawShape(c, spriteF);
  c.restore();
}
function stopGame() { if (game) game.over = true; }

function updateHp() {
  document.getElementById('hp-red').style.width = Math.max(0, (game.red.hp/game.red.maxHp)*100) + '%';
  document.getElementById('hp-blue').style.width = Math.max(0, (game.blue.hp/game.blue.maxHp)*100) + '%';
  document.getElementById('hp-text-red').textContent = `${Math.max(0,Math.ceil(game.red.hp))} / ${game.red.maxHp}`;
  document.getElementById('hp-text-blue').textContent = `${Math.max(0,Math.ceil(game.blue.hp))} / ${game.blue.maxHp}`;
  // Fight clock — counts down to the closing ring (0:20), then shows FOG while
  // the ring is active. Turns red and pulses once the fog is closing in.
  const clock = document.getElementById('fight-clock');
  if (clock) {
    const elapsed = game.elapsed || 0;
    if (elapsed < 20) {
      const secs = Math.ceil(20 - elapsed);
      clock.textContent = '0:' + (secs < 10 ? '0' : '') + secs;
      clock.classList.remove('urgent');
    } else {
      clock.textContent = 'FOG';
      clock.classList.add('urgent');
    }
  }
  updateStatuses();
}

// Collect the active status badges for a fighter. Each badge is {label, color}.
function fighterStatuses(f) {
  const out = [];
  // Berserker — Bloodrage active below 50% HP
  if (f.ability === 'tackle' && f.hp < f.maxHp * 0.5 && !f.dead) {
    out.push({ label: 'RAGE', color: '#ff2e2e' });
  }
  // Gambler — LOADED DICE: a low roll has rushed the next cooldown
  if (f.ability === 'wildcard' && f.loadedTimer > 0 && !f.dead) {
    out.push({ label: 'LOADED', color: '#ffd23d' });
  }
  // Archer — VOLLEY: the next shot will fan 4 arrows (every 4th shot)
  if (f.ability === 'arrow' && (f.shotCount % 4 === 3) && !f.dead) {
    out.push({ label: 'VOLLEY', color: '#3dff8a' });
  }
  // Ronin — Iai windup in progress
  if (f.iaiWindup > 0) {
    out.push({ label: 'WINDUP', color: '#e8c020' });
  }
  // Warlock — drain beam actively channeling
  if (f.drainTimer > 0) {
    out.push({ label: 'DRAINING', color: '#c050ff' });
  }
  // Witch's Mark — this fighter is marked, takes +50% damage
  if (f.witchMarkTimer > 0) {
    out.push({ label: 'MARKED', color: '#7dff3d' });
  }
  // Slowed — Hunter's CRIPPLING HOOK wound, or a Sapper wake. 40% slower.
  if (f.slowTimer > 0 && !f.dead) {
    out.push({ label: 'SLOWED', color: '#c89060' });
  }
  // Stunned — frozen by the Hunter's CRIPPLING HOOK, can't move or act
  if (f.stunTimer > 0 && !f.dead) {
    out.push({ label: 'STUNNED', color: '#ffd23d' });
  }
  // NOTE: Wizard/Jester/Duelist defensive passives no longer get a "DOWN"
  // badge — their ready-state is shown by the solid ring around the fighter
  // (present = armed, absent = down), so a badge would just double-report.
  // Caught in the closing-ring fog
  if (game.elapsed > 20 && !f.dead) {
    const dc = Math.hypot(f.x - game.w / 2, f.y - game.h / 2);
    if (dc > (game.ringRadius || 999)) {
      out.push({ label: 'FOG', color: '#d25aff' });
    }
  }
  return out;
}

function renderStatusRow(elId, statuses) {
  const el = document.getElementById(elId);
  if (!el) return;
  // Rebuild only when the set of labels changed — avoids thrashing the DOM each frame.
  const key = statuses.map(s => s.label).join(',');
  if (el.dataset.key === key) return;
  el.dataset.key = key;
  el.innerHTML = '';
  statuses.forEach(s => {
    const b = document.createElement('div');
    b.className = 'status-badge';
    b.textContent = s.label;
    b.style.color = s.color;
    b.style.border = '1px solid ' + s.color;
    el.appendChild(b);
  });
}

function updateStatuses() {
  if (!game) return;
  renderStatusRow('status-red', fighterStatuses(game.red));
  renderStatusRow('status-blue', fighterStatuses(game.blue));
}

// Fixed simulation timestep. The loop accumulates real time and advances the
// sim in exact FIXED_DT chunks — so the fight is fully deterministic from its
// seed (frame drops or machine speed can't change the outcome). The headless
// upset-hunt calls the same advance() so a hunted seed reproduces exactly.
const FIXED_DT = 1 / 60;

// Skeleton (Necromancer minion) tuning. Skeletons now take REAL damage routed
// through damageSkeleton() — each attacker's true dmg stat applies — so HP is a
// meaningful pool. SKEL_HP is the balance lever. MELEE_SKEL_IFRAME: after a
// melee strike hits a skeleton it can't be hit again for this long (longer than
// any 0.3s strike window), so one strike lands once, not once per frame.
const SKEL_HP = 14;
const MELEE_SKEL_IFRAME = 0.35;

// Gambler WILDCARD: damage of one thrown coin. Every die face throws coins, so
// this is the single lever for the Gambler's overall power. Tune toward ~50%.
const COIN_DMG = 5;

// Hunter CRIPPLING HOOK: when a hook connects, the wounded enemy is STUNNED
// for this long — frozen, unable to use their ability. This is the Hunter's
// answer to single-hit counters: a stunned Reaper can't spin, a stunned Jester
// can't blink, a stunned Duelist can't riposte. Must stay well under the hook
// cooldown (1.5s) or it becomes a perma-lock. Balance lever.
const CRIPPLE_STUN = 0.4;

// Damage-float debounce: a multi-hit burst keeps merging into one float as long
// as hits arrive within this many ms of each other; once a gap this long passes
// with no new hit, the float resolves (punches once, then floats off). Shared
// by damage() and the float update loop so merge timing == resolve timing.
const BATCH_GAP = 240;

// advance() — step the sim forward by exactly one fixed tick, applying the
// slow-mo, hit-stop and timer logic. Returns true if the fight is fully over
// (finish window elapsed). Drives both the live loop and the headless hunt.
function advance() {
  const realDt = FIXED_DT;
  if (game.winner) {
    game.timeScale = Math.min(1, game.timeScale + realDt * 0.9);
  }
  if (game.koTimer > 0) game.koTimer -= realDt;
  if (game.flashFrame > 0) game.flashFrame -= realDt;
  let simDt = realDt * game.timeScale;
  if (game.hitStop > 0) {
    game.hitStop -= realDt;
    simDt = 0;
  }
  if (game.shakeTime > 0) {
    game.shakeTime -= realDt;
    if (game.shakeTime <= 0) game.shakeMag = 0;
  }
  step(simDt);
  if (game.winner && game.finishTimer > 0) {
    game.finishTimer -= realDt;
    if (game.finishTimer <= 0) { game.over = true; return true; }
  }
  return false;
}

function loop() {
  // Bail if the game was replaced (restart/back) or finished, or the intro is
  // still playing — a stale RAF callback from a previous fight ends here.
  if (!game || game.over || game.token !== fightToken || game.introPlaying) return;
  const now = performance.now();
  let frameTime = (now - game.lastT) / 1000;
  game.lastT = now;
  if (frameTime > 0.25) frameTime = 0.25; // clamp huge stalls (tab switch)
  // Fixed-timestep accumulator: bank real time, spend it in exact ticks.
  game.acc = (game.acc || 0) + frameTime;
  let finished = false;
  while (game.acc >= FIXED_DT && !finished) {
    finished = advance();
    game.acc -= FIXED_DT;
  }
  draw();
  if (finished) { showWinnerOverlay(); return; }
  requestAnimationFrame(loop);
}

function bounce(f, w, h) {
  if (f.x - f.size < 0) { f.x = f.size; f.vx = Math.abs(f.vx); }
  if (f.x + f.size > w) { f.x = w - f.size; f.vx = -Math.abs(f.vx); }
  if (f.y - f.size < 0) { f.y = f.size; f.vy = Math.abs(f.vy); }
  if (f.y + f.size > h) { f.y = h - f.size; f.vy = -Math.abs(f.vy); }
}
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// ============================================================================
// === COMBAT =================================================================
// damage() — applies defensive passives (Jester dodge, Cannoneer powder store,
//   Knight plate armor, Wizard mana shield) and handles death.
// styleFor() — maps ability id → particle style for hit feedback.
// (Future file: combat.js)
// ============================================================================

function styleFor(f) {
  // Map character id to particle style
  switch (f.ability) {
    case 'lightning': return 'cross';
    case 'tackle':    return 'shard';
    case 'cast':    return 'rune';
    case 'sword':     return 'spark';
    case 'mine':      return 'smoke';
    case 'arrow':     return 'streak';
    default:          return 'square';
  }
}

// --- Impact juice -----------------------------------------------------------
// shake(mag): kick the screen-shake. mag is roughly "pixels of displacement".
// Bigger hits call this with a bigger mag, so impact scales with damage.
function shake(mag) {
  if (headless || !game) return;
  // Don't let a small hit cut short a big shake already in progress.
  game.shakeMag = Math.max(game.shakeMag, mag);
  game.shakeTime = Math.max(game.shakeTime, 0.18 + mag * 0.012);
}
// hitStop(dur): freeze the sim for a few ms. The micro-pause makes a hit land
// hard — it's the core trick behind "punchy" game feel. NOTE: not guarded by
// `headless` — the headless runner replicates the loop's hitstop handling so
// a hunted seed reproduces the exact same fight when watched live.
function hitStop(dur) {
  if (!game) return;
  game.hitStop = Math.max(game.hitStop, dur);
}

function damage(target, dmg, srcKind) {
  if (target.dead) return;
  // Fog (closing-ring) damage is environmental — bypasses every dodge, shield,
  // parry, and reduction. It also doesn't spawn a damage float (the ring visual
  // and the draining HP bar already make it obvious).
  if (srcKind === 'fog') {
    target.hp -= dmg;
    target.flash = 0.12;
    if (target.hp <= 0) {
      target.hp = 0;
      target.dead = true;
      sfx('death', null, target.x);
      spawnParticles(target.x, target.y, 24, '#ffe83d', 'shard');
      endGame();
    }
    return;
  }
  // Jester: Uncanny Dodge — phases through next hit, plus 0.3s follow-up invuln window
  if (target.ability === 'blink' && target.dodgeInvuln > 0) {
    return;
  }
  if (target.ability === 'blink' && target.dodgeReady) {
    target.dodgeReady = false;
    target.dodgeTimer = 5;
    target.dodgeInvuln = 0.3;
    target.negateFlash = 0.25;
    spawnParticles(target.x, target.y, 8, '#e8d8b8', 'spark');
    sfx('negate', null, target.x);
    return;
  }
  // (Cannoneer's old Powder Store invuln-on-windup was removed — its passive
  // is now SIEGE ROUNDS, an offensive armor-piercing trait handled below.)
  // Duelist: parry window fully absorbs PROJECTILES (reflection handled in the
  // projectile loop). Melee hits are NOT parried — they fall through to En Garde
  // for the 50% reduction. (Parry = anti-ranged, En Garde = anti-melee.)
  if (target.ability === 'riposte' && target.parryTimer > 0 && (srcKind === 'projectile' || srcKind === 'siege')) {
    target.negateFlash = 0.25;
    spawnParticles(target.x, target.y, 10, '#c0c0e8', 'spark');
    sfx('parry', null, target.x);
    return;
  }
  // Duelist: En Garde — 50% reduction on next melee/contact hit. Projectiles must be parried instead.
  if (target.ability === 'riposte' && target.enGarde && !srcKind) {
    dmg = dmg * 0.5;
    target.enGarde = false;
    target.stillTimer = 0;
    target.enGardeCd = 2.7; // recharge — deliberately NOT 2.5s: an exact 2.5
    // matched the Jester's blink cooldown, so every Jester hit landed the frame
    // En Garde refreshed and the Duelist had a permanent 50% reduction vs it.
    spawnParticles(target.x, target.y, 8, '#c0c0e8', 'spark');
  }
  // Knight: Plate Armor — flat reduction. Bypassed by siege rounds (the
  // Cannoneer's armor-piercing shot punches straight through plate).
  if (target.ability === 'sword' && srcKind !== 'siege') {
    dmg = Math.max(1, dmg - 2);
  }
  // Ronin: Resolve — 45% damage reduction during iai windup (committed stance).
  // Siege rounds pierce it — armor-piercing ignores damage reduction.
  let resolved = false;
  if (target.ability === 'iai' && target.iaiWindup > 0 && srcKind !== 'siege') {
    dmg = dmg * 0.55;
    resolved = true;
  }
  // Wizard: Mana Shield — 50% reduction on first hit each cycle. Siege rounds
  // pierce it — armor-piercing ignores damage reduction. (The shield is NOT
  // consumed by a hit it couldn't have reduced.)
  // Wizard: Mana Shield — 50% reduction, powered by orbs. No cooldown: each
  // hit consumes one of the Wizard's live orb projectiles to halve the damage.
  // Out of orbs = no shield. Spending an orb also frees a cast slot, so the
  // Wizard is always trading offense (orbs in flight) against defense.
  // Siege rounds still pierce it — armor-piercing ignores reduction.
  let shielded = false;
  if (target.ability === 'cast' && srcKind !== 'siege') {
    const orbIdx = game.projectiles.findIndex(p => p.kind === 'orb' && p.team === target.team);
    if (orbIdx !== -1) {
      dmg = dmg * 0.5;
      game.projectiles.splice(orbIdx, 1); // an orb is spent to power the shield
      shielded = true;
    }
  }
  target.hp -= dmg;
  // Cumulative damage for feedback: a multi-hit burst (e.g. the Archer's
  // 4-arrow volley = four 7-dmg calls) should FEEL like its total, not like
  // one arrow. If this hit will merge into a recent float, the juice scales
  // off the running total; otherwise it's just this hit.
  const nowT = performance.now();
  // Damage floats DEBOUNCE: a float stays "open" and keeps absorbing hits as
  // long as the next hit arrives within BATCH_GAP of the last one. The window
  // RESETS on every hit, so a burst defines its own size — a tight 8-coin
  // barrage becomes one number; two attacks with a real pause become two.
  // While open the number updates quietly (no re-punch, doesn't rise yet);
  // once a gap passes with no new hit it RESOLVES — one punch, then floats off.
  // Drain is the exception: a long gap so its slow ticks stay one calm number.
  const gap = (srcKind === 'drain') ? 1100 : BATCH_GAP;
  const burstMerge = target.dmgFloat && target.dmgFloat.open
    && (nowT - target.dmgFloat.lastHit) < gap;
  const feedbackDmg = burstMerge ? (target.dmgFloat.total + Math.ceil(dmg)) : dmg;
  // Impact feedback scales with damage magnitude — a chip barely registers,
  // a big hit rocks the screen, flashes hard, and briefly freezes the sim.
  // Fog/drain are environmental/continuous — they skip the punchy feedback.
  const big = Math.min(1, feedbackDmg / 26); // 0..1, ~1 at the heaviest hits
  if (srcKind !== 'fog' && srcKind !== 'drain') {
    target.flash = 0.14 + big * 0.20;
    shake(2 + big * 9);
    if (feedbackDmg >= 12) hitStop(0.03 + big * 0.05);
    spawnParticles(target.x, target.y, 3 + Math.round(big * 9),
                   target.team === 'red' ? '#ff6b6b' : '#6bb6ff', 'spark');
  } else {
    target.flash = 0.12;
  }
  // Sound: drain ticks are silent — the sustained `drain` beam drone (played
  // once when the channel starts) covers the whole leech. Other hits play a
  // punchier sound, pitch-scaled to damage magnitude.
  if (srcKind !== 'drain') sfx('hit', dmg, target.x);
  // Damage float — debounced (see BATCH_GAP above). An "open" float sits frozen
  // in place accumulating hits; the float update loop resolves it once a gap
  // passes with no new hit, at which point it punches once and floats off.
  {
    if (burstMerge) {
      // Still in the burst — fold this hit into the open float.
      target.dmgFloat.total += Math.ceil(dmg);
      target.dmgFloat.text = '-' + target.dmgFloat.total;
      target.dmgFloat.lastHit = nowT;        // reset the debounce timer
      target.dmgFloat.big = (srcKind === 'drain') ? 0.15 : big;
      // Re-punch on every hit (drain excepted — its slow ticks stay calm).
      if (srcKind !== 'drain') target.dmgFloat.age = 0;
    } else {
      // Burst ended (or first hit) — start a fresh float. If a previous float
      // is still on screen, spawn ABOVE it so successive bursts stack into a
      // readable column instead of overlapping.
      let spawnY = target.y - target.size;
      if (target.dmgFloat && target.dmgFloat.life > 0) {
        spawnY = Math.min(spawnY, target.dmgFloat.y - 16);
      }
      const f = { x: target.x, y: spawnY, vy: -40, life: 0.8,
                  text: '-' + Math.ceil(dmg), color: target.team === 'red' ? '#ff2e2e' : '#2e9eff',
                  total: Math.ceil(dmg), big: (srcKind === 'drain') ? 0.15 : big,
                  age: 0, open: true, lastHit: nowT, gap: gap,
                  // Drain floats live for the whole channel (~1.2s) — long
                  // enough for the target to wander away from a fixed number.
                  // Tag the target so the update loop tracks it while open.
                  follow: (srcKind === 'drain') ? target : null };
      game.floatTexts.push(f);
      target.dmgFloat = f;
    }
  }
  if (shielded) {
    spawnParticles(target.x, target.y, 10, '#c77dff', 'rune');
  }
  if (resolved) {
    spawnParticles(target.x, target.y, 8, '#e8c020', 'spark');
  }
  spawnParticles(target.x, target.y, 6, target.team === 'red' ? '#ff2e2e' : '#2e9eff', 'shard');
  if (target.hp <= 0) {
    target.dead = true;
    sfx('death', null, target.x);
    spawnParticles(target.x, target.y, 24, '#ffe83d', 'shard');
    endGame();
  }
}
// ============================================================================
// === PARTICLES ==============================================================
// spawnFloat() — floating damage / status text (e.g. "-12", "DODGE").
// spawnParticles() — multi-style particle bursts: cross, shard, rune, spark,
//   smoke, streak, square. Style maps to character identity.
// (Future file: particles.js)
// ============================================================================

function spawnFloat(x, y, text, color) { game.floatTexts.push({ x, y, vy:-40, life:0.8, text, color }); }
// Heal floats ("+N") are tinted to the healed fighter's team so you can tell
// WHO healed — but lightened, so they read distinct from that team's
// (saturated) damage numbers. Used by every heal float for consistency.
function healColor(f) { return f.team === 'red' ? '#ff8888' : '#88c8ff'; }
function spawnParticles(x, y, n, color, style) {
  style = style || 'square';
  for (let i = 0; i < n; i++) {
    const a = vrng() * Math.PI * 2;
    let s = 60 + vrng() * 120;
    let p = {
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 0.4 + vrng() * 0.3,
      color, style,
      size: 2 + vrng() * 3,
      rot: vrng() * Math.PI * 2,
      vrot: (vrng() - 0.5) * 6,
    };
    if (style === 'cross') {
      // Drift upward, slow horizontal
      p.vx *= 0.4;
      p.vy = -30 - vrng() * 60;
      p.life = 0.7 + vrng() * 0.3;
      p.size = 3 + vrng() * 3;
    } else if (style === 'shard') {
      // Triangular blood shards, faster outward
      p.vx = Math.cos(a) * (140 + vrng() * 80);
      p.vy = Math.sin(a) * (140 + vrng() * 80);
      p.life = 0.5 + vrng() * 0.3;
      p.size = 3 + vrng() * 4;
    } else if (style === 'rune') {
      // Slow swirling, spawn in a tight ring
      const r = 4 + vrng() * 6;
      p.x = x + Math.cos(a) * r;
      p.y = y + Math.sin(a) * r;
      p.vx = Math.cos(a) * 40;
      p.vy = Math.sin(a) * 40 - 20;
      p.life = 0.8 + vrng() * 0.4;
      p.size = 4 + vrng() * 2;
    } else if (style === 'spark') {
      // Thin metal slashes, fast and short-lived
      p.vx = Math.cos(a) * (180 + vrng() * 120);
      p.vy = Math.sin(a) * (180 + vrng() * 120);
      p.life = 0.2 + vrng() * 0.2;
      p.size = 1.5 + vrng() * 1.5;
      p.len = 6 + vrng() * 6;
    } else if (style === 'smoke') {
      // Slow, expanding, fading
      p.vx = Math.cos(a) * 30;
      p.vy = Math.sin(a) * 30 - 20;
      p.life = 0.9 + vrng() * 0.4;
      p.size = 4 + vrng() * 4;
      p.grow = 18 + vrng() * 10;
    } else if (style === 'streak') {
      // Aerodynamic green lines, narrow spread
      const baseAngle = a;
      p.vx = Math.cos(baseAngle) * (120 + vrng() * 60);
      p.vy = Math.sin(baseAngle) * (120 + vrng() * 60);
      p.life = 0.3 + vrng() * 0.2;
      p.size = 1.5;
      p.len = 8 + vrng() * 4;
    }
    game.particles.push(p);
  }
}

// ============================================================================
// === ABILITIES ==============================================================
// fireAbility() — what each fighter does when their cooldown fires.
// resolveAim() — fires the actual projectile after windup completes
//   (Priest lightning, Cannoneer cannon shot).
// (Future file: abilities.js)
// ============================================================================

function fireAbility(f, enemy) {
